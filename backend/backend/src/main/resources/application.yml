# 模块说明：后端主配置文件，集中管理端口、数据库、Redis、上传、日志等运行参数。
# 所有可能在部署时变化的参数均使用 ${ENV:default} 形式，便于 Docker / K8s 注入。
server:
  port: ${SERVER_PORT:8081}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/chat_tables.sql

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:community}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:Lzh.102033}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

app:
  uploads-dir: ${UPLOADS_DIR:}
  cache:
    skill-detail-ttl-seconds: ${CACHE_SKILL_DETAIL_TTL:600}
  rate-limit:
    login-max-fail: ${LOGIN_MAX_FAIL:5}
    login-lock-seconds: ${LOGIN_LOCK_SECONDS:300}
